<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="moviebesGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#26b9a8;stop-opacity:1" />
    </linearGradient>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Creepster&amp;display=swap');
      .logo-text { 
        font-family: 'Creepster', cursive; 
        font-size: 80px; 
        fill: url(#moviebesGradient);
        filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5));
      }
    </style>
  </defs>

  <circle cx="50" cy="50" r="48" fill="#262626" />
  
  <circle cx="50" cy="50" r="44" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-opacity="0.2" />

  <text x="52%" y="54%" dominant-baseline="central" text-anchor="middle" class="logo-text">
    C
  </text>
